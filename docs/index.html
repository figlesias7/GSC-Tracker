<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSC Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.4;
    }
    h1, h2 {
      margin-bottom: 10px;
    }
    .small {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 24px 0;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      background: #fafafa;
    }
    .label {
      font-size: 14px;
      color: #666;
    }
    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 6px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 20px 0 12px 0;
    }
    .search-input, .date-input, .select-input, .button-input {
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .search-input {
      min-width: 320px;
      flex: 1;
    }
    .results-count {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }
    th {
      background: #f3f3f3;
      cursor: pointer;
      user-select: none;
    }
    th:hover {
      background: #e9e9e9;
    }
    .sort-indicator {
      font-size: 12px;
      margin-left: 6px;
      color: #666;
    }
    a {
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Google Search Console Dashboard</h1>
  <div class="small" id="meta">Loading...</div>

  <div class="cards">
    <div class="card">
      <div class="label">Total Clicks</div>
      <div class="value" id="clicks">-</div>
    </div>
    <div class="card">
      <div class="label">Total Impressions</div>
      <div class="value" id="impressions">-</div>
    </div>
    <div class="card">
      <div class="label">Average Position</div>
      <div class="value" id="position">-</div>
    </div>
    <div class="card">
      <div class="label">Pages Tracked</div>
      <div class="value" id="pages">-</div>
    </div>
  </div>

  <h2>Pages</h2>

  <div class="controls">
    <input
      type="text"
      id="search-box"
      class="search-input"
      placeholder="Search pages by URL, slug, city, or keyword"
      oninput="applyFilters()"
    />

    <select id="range-select" class="select-input" onchange="handleRangeChange()">
      <option value="1">Last Day</option>
      <option value="7">Last 7 Days</option>
      <option value="30" selected>Last 30 Days</option>
      <option value="custom">Custom</option>
    </select>

    <input type="date" id="start-date" class="date-input" />
    <input type="date" id="end-date" class="date-input" />

    <button class="button-input" onclick="applyFilters()">Apply</button>
  </div>

  <div class="results-count" id="results-count">Showing 0 pages</div>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable('page')">Page <span class="sort-indicator" id="page-indicator"></span></th>
        <th onclick="sortTable('clicks')">Clicks <span class="sort-indicator" id="clicks-indicator"></span></th>
        <th onclick="sortTable('impressions')">Impressions <span class="sort-indicator" id="impressions-indicator"></span></th>
        <th onclick="sortTable('ctr')">CTR <span class="sort-indicator" id="ctr-indicator"></span></th>
        <th onclick="sortTable('position')">Position <span class="sort-indicator" id="position-indicator"></span></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <script>
    let rawData = [];
    let aggregatedData = [];
    let currentSort = { column: 'clicks', direction: 'desc' };

    async function loadDashboard() {
      rawData = await fetch('./daily_data.json').then(r => r.json());

      const allDates = rawData.map(r => r.date).filter(Boolean).sort();
      const latestDate = allDates[allDates.length - 1];

      document.getElementById('meta').textContent =
        `Default view: Last 30 days ending ${latestDate}. Use the range filter to change the reporting window.`;

      setPresetRange(30, latestDate);
      applyFilters();
    }

    function handleRangeChange() {
      const value = document.getElementById('range-select').value;
      const allDates = rawData.map(r => r.date).filter(Boolean).sort();
      const latestDate = allDates[allDates.length - 1];

      if (value === 'custom') {
        return;
      }

      setPresetRange(Number(value), latestDate);
      applyFilters();
    }

    function setPresetRange(days, latestDateStr) {
      const latestDate = new Date(latestDateStr + 'T00:00:00');
      const startDate = new Date(latestDate);
      startDate.setDate(startDate.getDate() - (days - 1));

      document.getElementById('start-date').value = formatDateLocal(startDate);
      document.getElementById('end-date').value = latestDateStr;
    }

    function formatDateLocal(d) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function applyFilters() {
      const query = document.getElementById('search-box').value.trim().toLowerCase();
      const startDate = document.getElementById('start-date').value;
      const endDate = document.getElementById('end-date').value;

      let filtered = rawData.filter(row => {
        const matchesQuery = !query || String(row.page).toLowerCase().includes(query);
        const matchesStart = !startDate || row.date >= startDate;
        const matchesEnd = !endDate || row.date <= endDate;
        return matchesQuery && matchesStart && matchesEnd;
      });

      const grouped = {};

      filtered.forEach(row => {
        const page = row.page;
        if (!grouped[page]) {
          grouped[page] = {
            page: page,
            clicks: 0,
            impressions: 0,
            weightedPositionSum: 0,
            positionWeight: 0
          };
        }

        grouped[page].clicks += Number(row.clicks || 0);
        grouped[page].impressions += Number(row.impressions || 0);

        const impressions = Number(row.impressions || 0);
        const position = Number(row.position || 0);
        grouped[page].weightedPositionSum += position * impressions;
        grouped[page].positionWeight += impressions;
      });

      aggregatedData = Object.values(grouped).map(row => {
        const ctr = row.impressions > 0 ? row.clicks / row.impressions : 0;
        const position = row.positionWeight > 0 ? row.weightedPositionSum / row.positionWeight : 0;

        return {
          page: row.page,
          clicks: row.clicks,
          impressions: row.impressions,
          ctr: ctr,
          position: position
        };
      });

      updateCards();
      sortAggregatedData();
      renderTable();
      updateResultsCount();
      updateMeta(startDate, endDate);
    }

    function updateCards() {
      const totalClicks = aggregatedData.reduce((sum, row) => sum + Number(row.clicks || 0), 0);
      const totalImpressions = aggregatedData.reduce((sum, row) => sum + Number(row.impressions || 0), 0);
      const totalPages = aggregatedData.length;

      let weightedPositionSum = 0;
      let totalWeight = 0;
      aggregatedData.forEach(row => {
        weightedPositionSum += Number(row.position || 0) * Number(row.impressions || 0);
        totalWeight += Number(row.impressions || 0);
      });

      const avgPosition = totalWeight > 0 ? weightedPositionSum / totalWeight : 0;

      document.getElementById('clicks').textContent = totalClicks.toLocaleString();
      document.getElementById('impressions').textContent = totalImpressions.toLocaleString();
      document.getElementById('position').textContent = avgPosition.toFixed(1);
      document.getElementById('pages').textContent = totalPages.toLocaleString();
    }

    function updateMeta(startDate, endDate) {
      document.getElementById('meta').textContent =
        `Showing data from ${startDate || 'earliest available'} through ${endDate || 'latest available'}. Default view is Last 30 Days.`;
    }

    function sortTable(column) {
      if (currentSort.column === column) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.column = column;
        currentSort.direction = column === 'page' ? 'asc' : 'desc';
      }

      sortAggregatedData();
      renderTable();
      updateIndicators();
    }

    function sortAggregatedData() {
      aggregatedData.sort((a, b) => {
        let aVal = a[currentSort.column];
        let bVal = b[currentSort.column];

        if (currentSort.column === 'page') {
          aVal = String(aVal).toLowerCase();
          bVal = String(bVal).toLowerCase();

          if (aVal < bVal) return currentSort.direction === 'asc' ? -1 : 1;
          if (aVal > bVal) return currentSort.direction === 'asc' ? 1 : -1;
          return 0;
        } else {
          aVal = Number(aVal);
          bVal = Number(bVal);
          return currentSort.direction === 'asc' ? aVal - bVal : bVal - aVal;
        }
      });

      updateIndicators();
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      aggregatedData.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><a href="${row.page}" target="_blank">${row.page}</a></td>
          <td>${Number(row.clicks).toLocaleString()}</td>
          <td>${Number(row.impressions).toLocaleString()}</td>
          <td>${(Number(row.ctr) * 100).toFixed(2)}%</td>
          <td>${Number(row.position).toFixed(1)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function updateIndicators() {
      const columns = ['page', 'clicks', 'impressions', 'ctr', 'position'];
      columns.forEach(col => {
        const el = document.getElementById(`${col}-indicator`);
        if (!el) return;
        el.textContent = currentSort.column === col
          ? (currentSort.direction === 'asc' ? '▲' : '▼')
          : '';
      });
    }

    function updateResultsCount() {
      const count = aggregatedData.length;
      document.getElementById('results-count').textContent =
        `Showing ${count.toLocaleString()} page${count === 1 ? '' : 's'}`;
    }

    loadDashboard();
  </script>
</body>
</html>
