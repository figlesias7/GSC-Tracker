<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSC Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.4;
    }
    h1, h2 {
      margin-bottom: 10px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 24px 0;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      background: #fafafa;
    }
    .label {
      font-size: 14px;
      color: #666;
    }
    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 6px;
    }
    .small {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .controls {
      margin: 20px 0 12px 0;
    }
    .search-input {
      width: 100%;
      max-width: 500px;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .results-count {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }
    th {
      background: #f3f3f3;
      cursor: pointer;
      user-select: none;
    }
    th:hover {
      background: #e9e9e9;
    }
    .sort-indicator {
      font-size: 12px;
      margin-left: 6px;
      color: #666;
    }
    a {
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Google Search Console Dashboard</h1>
  <div class="small" id="meta">Loading...</div>

  <div class="cards">
    <div class="card">
      <div class="label">Total Clicks</div>
      <div class="value" id="clicks">-</div>
    </div>
    <div class="card">
      <div class="label">Total Impressions</div>
      <div class="value" id="impressions">-</div>
    </div>
    <div class="card">
      <div class="label">Average Position</div>
      <div class="value" id="position">-</div>
    </div>
    <div class="card">
      <div class="label">Pages Tracked</div>
      <div class="value" id="pages">-</div>
    </div>
  </div>

  <h2>Top Pages</h2>

  <div class="controls">
    <input
      type="text"
      id="search-box"
      class="search-input"
      placeholder="Search pages by URL, slug, city, or keyword"
      oninput="applySearch()"
    />
    <div class="results-count" id="results-count">Showing 0 pages</div>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable('page')">Page <span class="sort-indicator" id="page-indicator"></span></th>
        <th onclick="sortTable('clicks')">Clicks <span class="sort-indicator" id="clicks-indicator"></span></th>
        <th onclick="sortTable('impressions')">Impressions <span class="sort-indicator" id="impressions-indicator"></span></th>
        <th onclick="sortTable('ctr')">CTR <span class="sort-indicator" id="ctr-indicator"></span></th>
        <th onclick="sortTable('position')">Position <span class="sort-indicator" id="position-indicator"></span></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <script>
    let allData = [];
    let filteredData = [];
    let currentSort = { column: 'clicks', direction: 'desc' };

    async function loadDashboard() {
      const summary = await fetch('./summary.json').then(r => r.json());
      const topPages = await fetch('./top_pages.json').then(r => r.json());

      document.getElementById('meta').textContent =
        `Site: ${summary.site} | Snapshot date: ${summary.snapshot_date}`;

      document.getElementById('clicks').textContent = Number(summary.total_clicks).toLocaleString();
      document.getElementById('impressions').textContent = Number(summary.total_impressions).toLocaleString();
      document.getElementById('position').textContent = Number(summary.avg_position).toFixed(1);
      document.getElementById('pages').textContent = Number(summary.total_pages).toLocaleString();

      allData = topPages;
      applySearch();
      updateIndicators();
    }

    function applySearch() {
      const query = document.getElementById('search-box').value.trim().toLowerCase();

      if (!query) {
        filteredData = [...allData];
      } else {
        filteredData = allData.filter(row =>
          String(row.page).toLowerCase().includes(query)
        );
      }

      sortFilteredData();
      renderTable();
      updateResultsCount();
    }

    function sortTable(column) {
      if (currentSort.column === column) {
        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.column = column;
        currentSort.direction = column === 'page' ? 'asc' : 'desc';
      }

      sortFilteredData();
      renderTable();
      updateIndicators();
    }

    function sortFilteredData() {
      filteredData.sort((a, b) => {
        let aVal = a[currentSort.column];
        let bVal = b[currentSort.column];

        if (currentSort.column === 'page') {
          aVal = String(aVal).toLowerCase();
          bVal = String(bVal).toLowerCase();

          if (aVal < bVal) return currentSort.direction === 'asc' ? -1 : 1;
          if (aVal > bVal) return currentSort.direction === 'asc' ? 1 : -1;
          return 0;
        } else {
          aVal = Number(aVal);
          bVal = Number(bVal);
          return currentSort.direction === 'asc' ? aVal - bVal : bVal - aVal;
        }
      });
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      filteredData.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><a href="${row.page}" target="_blank">${row.page}</a></td>
          <td>${Number(row.clicks).toLocaleString()}</td>
          <td>${Number(row.impressions).toLocaleString()}</td>
          <td>${(Number(row.ctr) * 100).toFixed(2)}%</td>
          <td>${Number(row.position).toFixed(1)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function updateIndicators() {
      const columns = ['page', 'clicks', 'impressions', 'ctr', 'position'];
      columns.forEach(col => {
        const el = document.getElementById(`${col}-indicator`);
        if (!el) return;
        el.textContent = currentSort.column === col
          ? (currentSort.direction === 'asc' ? '▲' : '▼')
          : '';
      });
    }

    function updateResultsCount() {
      const count = filteredData.length;
      document.getElementById('results-count').textContent =
        `Showing ${count.toLocaleString()} page${count === 1 ? '' : 's'}`;
    }

    loadDashboard();
  </script>
</body>
</html>
