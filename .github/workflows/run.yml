name: GSC Export

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas google-api-python-client google-auth

      - name: Run script
        env:
          GSC_SITE: ${{ secrets.GSC_SITE }}
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python app.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data docs app.py
          git diff --cached --quiet || git commit -m "Update GSC dashboard data"
          git push
